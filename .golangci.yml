version: "2"
run:
  build-tags:
    - integration
  tests: true
linters:
  enable:
    - cyclop
    - depguard
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
    - testifylint
    - nilerr
    - nilnil
    - nakedret
    - gocritic
    - exhaustive
    - nestif
  settings:
    cyclop:
      # The maximal code complexity to report.
      # Default: 10
      max-complexity: 42
      # The maximal average package complexity.
      # If it's higher than 0.0 (float) the check is enabled.
      # Default: 0.0
      package-average: 9.0
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    depguard:
      rules:
        console-no-internal:
          files:
            - "**/console/**/*.go"
          deny:
            - pkg: "github.com/mallardduck/dirio/internal"
              desc: "console/ must not import internal/ — use consoleapi/ interface only"
        metadata-only-via-service:
          # Deny direct metadata imports in handler/adapter/CLI layers.
          # Intentionally NOT listed here (i.e. allowed to import metadata directly):
          #   internal/persistence/**  — metadata lives here
          #   internal/service/**     — service layer wraps metadata
          #   internal/http/auth/**   — auth reads users directly for credential lookup
          #   internal/policy/**      — policy engine resolves policies directly
          #   internal/http/server/** — server wires up the metadata manager at startup
          #   internal/context/**     — context helpers used by the above layers
          files:
            - "**/internal/http/api/**/*.go"
            - "**/internal/minio/**/*.go"
            - "**/console/**/*.go"
            - "**/consoleapi/**/*.go"
            - "**/cmd/**/*.go"
            - "**/pkg/**/*.go"
            - "**/tests/**/*.go"
          deny:
            - pkg: "github.com/mallardduck/dirio/internal/persistence/metadata"
              desc: "import metadata only via the service layer (ServicesFactory); HTTP handlers and console adapters must not access metadata directly"
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - unparam
        path: _test\.go
      - linters:
          - staticcheck
        text: 'SA1019:'
    paths:
      - third_party$
      - builtin$
      - examples$
      - console/components
      - console/utils/templui.go
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mallardduck/dirio
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
