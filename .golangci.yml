version: "2"
run:
  build-tags:
    - integration
  tests: true
  skip-dirs:
    - console/components
linters:
  enable:
    - depguard
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
    - testifylint
    - nilerr
    - nilnil
    - nakedret
    - gocritic
    - exhaustive
    - nestif
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    depguard:
      rules:
        console-no-internal:
          files:
            - "**/console/**/*.go"
          deny:
            - pkg: "github.com/mallardduck/dirio/internal"
              desc: "console/ must not import internal/ — use consoleapi/ interface only"
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - unparam
        path: _test\.go
      - linters:
          - staticcheck
        text: 'SA1019:'
    paths:
      - third_party$
      - builtin$
      - examples$
      - console/components
      - console/utils/templui.go
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mallardduck/dirio
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
