# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
#
# Client (dio) release config for linux + darwin. Run via the release workflow
# after the server config; run manually via "Release (Client)" workflow.

version: 2

project_name: dirio

before:
  hooks:
    - go mod tidy

builds:
  - id: client
    main: ./cmd/client
    binary: dio
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mallardduck/dirio/internal/version.Version={{.Version}}
      - -X github.com/mallardduck/dirio/internal/version.Commit={{.Commit}}
      - -X github.com/mallardduck/dirio/internal/version.BuildTime={{.Date}}
      - -X github.com/mallardduck/dirio/internal/version.BuiltBy=goreleaser
      - -X github.com/mallardduck/dirio/internal/version.GitTreeState={{.GitTreeState}}

archives:
  - id: client-archive
    builds:
      - client
    name_template: "dio_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: 'checksums-client.txt'

changelog:
  disable: true