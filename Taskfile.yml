version: "3"

vars:
  TAILWIND_BASE_URL: https://github.com/tailwindlabs/tailwindcss/releases/latest/download

tasks:
  # ── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build the server binary using GoReleaser (local snapshot)
    cmds:
      - goreleaser build --id=server --snapshot --clean --single-target

  build-client:
    desc: Build the client binary using GoReleaser (local snapshot)
    cmds:
      - goreleaser build --id=client --snapshot --clean --single-target

  build-all:
    desc: Build both binaries using GoReleaser (local snapshot)
    cmds:
      - goreleaser build --snapshot --clean --single-target

  # ── Release ────────────────────────────────────────────────────────────────

  release-server:
    desc: Build for all platforms (server only)
    cmds:
      - goreleaser build --id=server --snapshot --clean

  release-client:
    desc: Build for all platforms (client only)
    cmds:
      - goreleaser build --id=client --snapshot --clean

  release-all:
    desc: Build for all platforms (both)
    cmds:
      - goreleaser build --snapshot --clean

  # ── Clean ──────────────────────────────────────────────────────────────────

  clean:
    desc: Remove all generated build artifacts, binaries, and test output
    cmds:
      - rm -f dirio dirio-client
      - rm -rf bin/ dist/
      - rm -f coverage.out coverage.html

  # ── Tests ──────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests (except client tests which require Docker)
    cmds:
      - go test -v -race ./... -skip "TestAWSCLI|TestBoto3|TestMinIOMC|TestMCAdmin|TestSanityCheck"

  test-unit:
    desc: Run unit tests only (excludes integration and client tests)
    cmds:
      - go test -v -race ./internal/... ./pkg/...

  test-integration:
    desc: Run integration tests only
    cmds:
      - go test -v -race ./tests/integration/...

  test-admin:
    desc: Run admin API tests only
    cmds:
      - go test -v -race ./tests/admin/...

  test-console:
    desc: Run console UI tests only
    cmds:
      - go test -v -race ./tests/console/...

  test-coverage:
    desc: Run tests with coverage and generate HTML report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  test-clients:
    desc: Run client tests (requires Docker)
    cmds:
      # No -race: client tests drive external processes (Docker containers + subprocess server binary),
      # so the race detector only instruments testcontainers-go internals rather than DirIO code.
      # Races in the server are invisible to this binary's detector.
      - go test -v ./tests/clients/...

  test-perf:
    desc: Run opt-in profiling tests (seeds 10k objects, writes pprof files to tests/perf/profiles/)
    cmds:
      - go test -tags perf -v -timeout 30m -run TestPerf ./tests/perf/

  # ── Run ───────────────────────────────────────────────────────────────────

  run:
    desc: Run the server locally
    cmds:
      - go run ./cmd/server serve --data-dir ./data --port 9000

  run-mdns:
    desc: Run the server locally with mDNS
    cmds:
      - go run ./cmd/server serve --mdns-enabled --data-dir ./data --port 9000

  run-import:
    desc: Run the server with minio-data-2019 import
    cmds:
      - go run ./cmd/server serve --log-level=debug --verbosity=verbose --mdns-enabled --data-dir ./minio-data-2019 --port 9000

  run-import-2022:
    desc: Run the server with minio-data-2022 import
    cmds:
      - go run ./cmd/server serve --log-level=debug --verbosity=verbose --mdns-enabled --data-dir ./minio-data-2022-import --port 9000

  run-mdns-debug:
    desc: Run the server with mDNS and debug logging
    cmds:
      - go run ./cmd/server serve --log-level=debug --verbosity=verbose --mdns-enabled --data-dir ./data --port 9000

  run-profile:
    desc: Run the server with pprof endpoints enabled at /debug/pprof/
    cmds:
      - go run ./cmd/server serve --debug --data-dir ./data --port 9000

  seed-bench:
    desc: Seed bench-large bucket with 10k objects for performance profiling (requires mc and a running server)
    cmds:
      - scripts/seed-large-bucket.sh
    env:
      S3_ENDPOINT: "http://localhost:9000"
      S3_ACCESS_KEY: "dirio-admin"
      S3_SECRET_KEY: "dirio-admin-secret"

  # ── Docker ────────────────────────────────────────────────────────────────

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -f ./package/Dockerfile -t dirio:latest .

  docker-run:
    desc: Build and run with Docker
    deps: [docker-build]
    cmds:
      - docker run --rm -p 9000:9000 -v {{.PWD}}/data:/data dirio:latest
    vars:
      PWD:
        sh: pwd

  compose-up:
    desc: Run with docker-compose
    cmds:
      - docker-compose up -d

  compose-down:
    desc: Stop docker-compose
    cmds:
      - docker-compose down

  # ── Code quality ──────────────────────────────────────────────────────────

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  # ── UI tooling ────────────────────────────────────────────────────────────

  templ-gen:
    desc: Recompile all .templ files to _templ.go
    cmds:
      - go tool templ generate ./console/...

  vendor-htmx:
    desc: Download and vendor HTMX 2.0.7 into the embedded static directory
    cmds:
      - curl -sSL https://unpkg.com/htmx.org@2.0.7/dist/htmx.min.js -o console/static/js/htmx.min.js

  download-tailwind:
    desc: Download the Tailwind v4 standalone binary for the current OS/arch into ./bin/
    vars:
      TAILWIND_BIN:
        sh: |
          case "{{OS}}" in
            windows) echo "./bin/tailwindcss.exe" ;;
            darwin)  echo "./bin/tailwindcss" ;;
            *)       echo "./bin/tailwindcss" ;;
          esac
      TAILWIND_ARTIFACT:
        sh: |
          case "{{OS}}" in
            windows) echo "tailwindcss-windows-x64.exe" ;;
            darwin)
              arch=$(uname -m)
              if [ "$arch" = "arm64" ]; then echo "tailwindcss-macos-arm64"; else echo "tailwindcss-macos-x64"; fi ;;
            *)
              arch=$(uname -m)
              if [ "$arch" = "aarch64" ]; then echo "tailwindcss-linux-arm64"; else echo "tailwindcss-linux-x64"; fi ;;
          esac
    cmds:
      - echo "Downloading Tailwind standalone CLI ({{.TAILWIND_ARTIFACT}})..."
      - mkdir -p bin
      - curl -sSL {{.TAILWIND_BASE_URL}}/{{.TAILWIND_ARTIFACT}} -o {{.TAILWIND_BIN}}
      - |
        if [ "{{OS}}" != "windows" ]; then
          chmod +x {{.TAILWIND_BIN}}
        fi
      - echo "Tailwind binary ready at {{.TAILWIND_BIN}}"

  tailwind-build:
    desc: Generate minified Tailwind CSS from templ source files
    vars:
      TAILWIND_BIN:
        sh: |
          if [ "{{OS}}" = "windows" ]; then echo "./bin/tailwindcss.exe"; else echo "./bin/tailwindcss"; fi
    cmds:
      - "{{.TAILWIND_BIN}} -i ./console/ui/input.css -o ./console/static/style.css --minify"

  tailwind-watch:
    desc: Watch templ files and regenerate CSS on change (development mode)
    vars:
      TAILWIND_BIN:
        sh: |
          if [ "{{OS}}" = "windows" ]; then echo "./bin/tailwindcss.exe"; else echo "./bin/tailwindcss"; fi
    cmds:
      - "{{.TAILWIND_BIN}} -i ./console/ui/input.css -o ./console/static/style.css --watch"

  build-ui:
    desc: Rebuild all generated UI artifacts (templ → Go, then Tailwind → CSS)
    cmds:
      - task: templ-gen
      - task: tailwind-build

  setup-ui:
    desc: First-time setup — install all UI tooling and vendor JS/CSS dependencies
    cmds:
      - task: download-tailwind
      - task: vendor-htmx
      - task: build-ui