name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Maintenance"
    labels:
      - "chore"
      - "dependencies"
  - title: "Documentation"
    labels:
      - "documentation"
    collapse-after: 3

exclude-labels:
  - "skip-changelog"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "bug"
      - "fix"
      - "chore"
      - "dependencies"
  default: patch

template: |
  ## Changes

  $CHANGES

autolabeler:
  - label: "feature"
    branch:
      - '/^feat(ure)?[\/\-].+/'
    title:
      - '/^feat(\(.+\))?!?:/'
  - label: "bug"
    branch:
      - '/^fix[\/\-].+/'
      - '/^bugfix[\/\-].+/'
      - '/^hotfix[\/\-].+/'
    title:
      - '/^fix(\(.+\))?!?:/'
  - label: "chore"
    branch:
      - '/^chore[\/\-].+/'
      - '/^refactor[\/\-].+/'
    title:
      - '/^chore(\(.+\))?!?:/'
      - '/^refactor(\(.+\))?!?:/'
  - label: "documentation"
    branch:
      - '/^docs?[\/\-].+/'
    title:
      - '/^docs?(\(.+\))?!?:/'
  - label: "dependencies"
    branch:
      - '/^(deps?|dependabot)[\/\-].+/'
    title:
      - '/^(deps?|build)(\(.+\))?!?:/'
  - label: "major"
    title:
      - '/^[a-z]+(\(.+\))?!:/'
