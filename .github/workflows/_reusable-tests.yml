name: Reusable – Test Suite

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      uses: go-task/setup-task@70f2430ad412f838533de8c0515c749ffb2b8bd3 # v1.1.0

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run unit tests
      run: |
        set -o pipefail
        task test-unit 2>&1 | tee test-output.txt

    - name: Generate test summary
      if: always()
      run: |
        echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        PASS=$(grep -c "^--- PASS:" test-output.txt 2>/dev/null || echo 0)
        FAIL=$(grep -c "^--- FAIL:" test-output.txt 2>/dev/null || echo 0)
        SKIP=$(grep -c "^--- SKIP:" test-output.txt 2>/dev/null || echo 0)
        if [ "$FAIL" -gt 0 ]; then
          echo "❌ **$FAIL failed** | ✅ $PASS passed | ⏭️ $SKIP skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
          grep "^--- FAIL:" test-output.txt | sed 's/^--- FAIL: /- ❌ /' >> $GITHUB_STEP_SUMMARY
        elif [ "$PASS" -eq 0 ] && [ "$SKIP" -eq 0 ]; then
          echo "⚠️ No tests found or output could not be parsed" >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ All $PASS tests passed$([ "$SKIP" -gt 0 ] && echo " | ⏭️ $SKIP skipped")" >> $GITHUB_STEP_SUMMARY
        fi

