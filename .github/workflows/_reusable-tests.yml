        cache: true

    - name: Install Task
      uses: go-task/setup-task@70f2430ad412f838533de8c0515c749ffb2b8bd3 # v1.1.0

    - name: Download Tailwind
      run: task download-tailwind

    - name: Regenerate UI assets
      run: task build-ui

    - name: Check for drift
      run: |
        if ! git diff --exit-code; then
          echo ""
          echo "::error::Generated files are out of date. Run 'task build-ui' locally and commit the results."
          exit 1
        fi
