name: Head Image

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # Compute image tags using the SHA of the commit that was actually tested.
  # With workflow_run, github.sha points to the default branch HEAD at trigger
  # time, not the tested commit — so we extract it explicitly here.
  meta:
    name: Compute Metadata
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tags:         ${{ steps.meta.outputs.tags }}
      labels:       ${{ steps.meta.outputs.labels }}
      ref:          ${{ github.event.workflow_run.head_sha }}
      short_sha:    ${{ steps.sha.outputs.short }}
      base_version: ${{ steps.latest_tag.outputs.version }}

    steps:
    - name: Extract short SHA
      id: sha
      run: echo "short=${SHA::7}" >> $GITHUB_OUTPUT
      env:
        SHA: ${{ github.event.workflow_run.head_sha }}

    - name: Get latest release tag
      id: latest_tag
      run: |
        tag=$(gh release list --limit 1 --json tagName -q '.[0].tagName // "0.0.0"')
        echo "version=${tag#v}" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=head
          type=raw,value=sha-${{ steps.sha.outputs.short }}

  docker:
    name: Build & Push Head Image
    needs: meta
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      ref:     ${{ needs.meta.outputs.ref }}
      tags:    ${{ needs.meta.outputs.tags }}
      labels:  ${{ needs.meta.outputs.labels }}
      push:    true
      version: "${{ needs.meta.outputs.base_version }}-head+${{ needs.meta.outputs.short_sha }}"
    secrets: inherit
