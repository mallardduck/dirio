name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────────
  tests:
    uses: ./.github/workflows/_reusable-tests.yml

  # ── Binary release ────────────────────────────────────────────────────────────
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Fetch all tags
      run: git fetch --force --tags

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run GoReleaser Extra
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
      with:
        distribution: goreleaser
        version: latest
        args: release --config .goreleaser.extra.yaml --clean --skip=validate,announce
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container image release ───────────────────────────────────────────────────
  # Metadata computation runs in parallel with goreleaser (both need only tests),
  # but the actual docker push waits for goreleaser so the release is atomic.
  meta:
    name: Compute Image Metadata
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      tags:   ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ghcr.io/${{ github.repository }}
        labels: |
          org.opencontainers.image.vendor=MallardDuck
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

  docker:
    name: Release Image
    needs: [meta]
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      tags:           ${{ needs.meta.outputs.tags }}
      labels:         ${{ needs.meta.outputs.labels }}
      push:           true
      version:        ${{ github.ref_name }}
      built_by:       gha.docker
      git_tree_state: clean
    secrets: inherit
