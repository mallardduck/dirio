name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────────
  tests:
    uses: ./.github/workflows/_reusable-tests.yml

  # ── Binary release ────────────────────────────────────────────────────────────
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Fetch all tags
      run: git fetch --force --tags

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run GoReleaser Extra
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
      with:
        distribution: goreleaser
        version: latest
        args: release --config .goreleaser.extra.yaml --clean --skip=validate,announce
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container image release ───────────────────────────────────────────────────
  # Metadata computation runs in parallel with goreleaser (both need only tests),
  # but the actual docker push waits for goreleaser so the release is atomic.
  meta:
    name: Compute Image Metadata
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      tags:   ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ghcr.io/${{ github.repository }}
        labels: |
          org.opencontainers.image.vendor=MallardDuck
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

  docker:
    name: Release Image
    needs: [meta]
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      tags:           ${{ needs.meta.outputs.tags }}
      labels:         ${{ needs.meta.outputs.labels }}
      push:           true
      version:        ${{ github.ref_name }}
      built_by:       gha.docker
      git_tree_state: clean
    secrets: inherit
