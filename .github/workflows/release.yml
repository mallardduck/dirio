name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────────
  tests:
    uses: ./.github/workflows/_reusable-tests.yml

  # ── Binary release ────────────────────────────────────────────────────────────
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Fetch all tags
      run: git fetch --force --tags

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      uses: go-task/setup-task@70f2430ad412f838533de8c0515c749ffb2b8bd3 # v1.1.0

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container image release ───────────────────────────────────────────────────
  # Metadata computation runs in parallel with goreleaser (both need only tests),
  # but the actual docker push waits for goreleaser so the release is atomic.
  meta:
    name: Compute Image Metadata
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      tags:   ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

  docker:
    name: Release Image
    needs: [goreleaser, meta]
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      tags:   ${{ needs.meta.outputs.tags }}
      labels: ${{ needs.meta.outputs.labels }}
      push:   true
    secrets: inherit
