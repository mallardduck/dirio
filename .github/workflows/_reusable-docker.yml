name: Reusable – Docker Build & Push

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to check out. Defaults to the calling workflow SHA.'
        type: string
        default: ''
      tags:
        description: 'Newline-separated list of fully-qualified image:tag pairs to apply.'
        type: string
        required: true
      labels:
        description: 'Newline-separated OCI label key=value pairs (from docker/metadata-action).'
        type: string
        default: ''
      push:
        description: 'Push the built image to the registry.'
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to check out.'
        type: string
        default: 'main'
      tags:
        description: 'Newline-separated list of fully-qualified image:tag pairs to apply.'
        type: string
        required: true
      labels:
        description: 'Newline-separated OCI label key=value pairs.'
        type: string
        default: ''
      push:
        description: 'Push the built image to the registry.'
        type: boolean
        default: false   # safer default for manual runs

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref || github.sha }}

    - name: Log in to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build and push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        file: ./package/Dockerfile
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
