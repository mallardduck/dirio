# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
#
# Windows release config for both dirio (server) and dio (client). Run via the
# release workflow after the server config; run manually via "Release (Windows)"
# workflow to re-attach Windows binaries to an existing release tag.

version: 2

project_name: dirio

before:
  hooks:
    - go mod tidy
    # Install templ CLI pinned to the version in go.mod.
    - go install github.com/a-h/templ/cmd/templ@v0.3.1020
    # Download the Tailwind standalone binary for the current OS/arch.
    - task download-tailwind
    # Regenerate templ outputs and minify CSS from source.
    - task build-ui

builds:
  - id: server
    main: ./cmd/server
    binary: dirio
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mallardduck/dirio/internal/version.Version={{.Version}}
      - -X github.com/mallardduck/dirio/internal/version.Commit={{.Commit}}
      - -X github.com/mallardduck/dirio/internal/version.BuildTime={{.Date}}
      - -X github.com/mallardduck/dirio/internal/version.BuiltBy=goreleaser
      - -X github.com/mallardduck/dirio/internal/version.GitTreeState={{.GitTreeState}}

  - id: client
    main: ./cmd/client
    binary: dio
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mallardduck/dirio/internal/version.Version={{.Version}}
      - -X github.com/mallardduck/dirio/internal/version.Commit={{.Commit}}
      - -X github.com/mallardduck/dirio/internal/version.BuildTime={{.Date}}
      - -X github.com/mallardduck/dirio/internal/version.BuiltBy=goreleaser
      - -X github.com/mallardduck/dirio/internal/version.GitTreeState={{.GitTreeState}}

archives:
  - id: server-archive
    builds:
      - server
    name_template: "dirio_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - zip

  - id: client-archive
    builds:
      - client
    name_template: "dio_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - zip

checksum:
  name_template: 'checksums-windows.txt'

changelog:
  disable: true