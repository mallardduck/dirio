# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: dirio

before:
  hooks:
    - go mod tidy
    # Install templ CLI pinned to the version in go.mod.
    - go install github.com/a-h/templ/cmd/templ@v0.3.977
    # Download the Tailwind standalone binary for the current OS/arch.
    - task download-tailwind
    # Regenerate templ outputs and minify CSS from source.
    - task build-ui

builds:
  - id: server
    main: ./cmd/server
    binary: dirio
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mallardduck/dirio/internal/version.Version={{.Version}}
      - -X github.com/mallardduck/dirio/internal/version.Commit={{.Commit}}
      - -X github.com/mallardduck/dirio/internal/version.BuildTime={{.Date}}
      - -X github.com/mallardduck/dirio/internal/version.BuiltBy=goreleaser
      - -X github.com/mallardduck/dirio/internal/version.GitTreeState={{.GitTreeState}}

  - id: client
    main: ./cmd/client
    binary: dio
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mallardduck/dirio/internal/version.Version={{.Version}}
      - -X github.com/mallardduck/dirio/internal/version.Commit={{.Commit}}
      - -X github.com/mallardduck/dirio/internal/version.BuildTime={{.Date}}
      - -X github.com/mallardduck/dirio/internal/version.BuiltBy=goreleaser
      - -X github.com/mallardduck/dirio/internal/version.GitTreeState={{.GitTreeState}}

archives:
  - id: server-archive
    builds:
      - server
    name_template: "{{ .ProjectName }}-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

  - id: client-archive
    builds:
      - client
    name_template: "{{ .ProjectName }}-client_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'